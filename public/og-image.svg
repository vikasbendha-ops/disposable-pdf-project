<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Secure PDF Sharing">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1a17"/>
      <stop offset="100%" stop-color="#132925"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="970" cy="120" r="210" fill="#1f3c36" opacity="0.28" filter="url(#soft)"/>
  <circle cx="190" cy="520" r="170" fill="#1b3b35" opacity="0.22" filter="url(#soft)"/>

  <g transform="translate(92 110)">
    <rect x="0" y="0" width="112" height="112" rx="24" fill="#0f1f1b" stroke="#1f3c36"/>
    <path d="M56 18 92 32v26c0 23-14 38.5-36 45-22-6.5-36-22-36-45V32z" fill="url(#accent)"/>
    <path d="M56 34 79 42v15c0 14-9 24-23 29-14-5-23-15-23-29V42z" fill="#ecfdf5"/>
    <path d="m43 58 8 8 17-17" fill="none" stroke="#065f46" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="250" y="190" fill="#f8fafc" font-family="Outfit, Manrope, system-ui, sans-serif" font-size="66" font-weight="700">
    Secure PDF Sharing
  </text>
  <text x="250" y="265" fill="#a7f3d0" font-family="Manrope, system-ui, sans-serif" font-size="42" font-weight="600">
    Expiring Links, Access Control, and Audit Visibility
  </text>
  <text x="250" y="332" fill="#cbd5e1" font-family="Manrope, system-ui, sans-serif" font-size="31" font-weight="500">
    Protect sensitive documents without friction.
  </text>

  <g transform="translate(250 390)">
    <rect x="0" y="0" width="740" height="142" rx="20" fill="#0f1f1b" stroke="#2b4d45"/>
    <text x="36" y="56" fill="#e2e8f0" font-family="Manrope, system-ui, sans-serif" font-size="27" font-weight="600">
      - Password protection and viewer restrictions
    </text>
    <text x="36" y="97" fill="#e2e8f0" font-family="Manrope, system-ui, sans-serif" font-size="27" font-weight="600">
      - Link expiry, revocation, and analytics tracking
    </text>
  </g>
</svg>
